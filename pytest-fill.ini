[pytest]
# Configuration for fill command

# Only search for fixture generation tests
testpaths = tests/consensus_fixtures

# Load pytest plugins
addopts =
    -p lean_spec_test_tools.pytest_plugins.filler
    -p lean_spec_test_tools.pytest_plugins.fixtures
    # Show shorter tracebacks
    --tb=short
    # Disable coverage for fixture generation
    --no-cov

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')

# Minimal output for filling
console_output_style = classic
