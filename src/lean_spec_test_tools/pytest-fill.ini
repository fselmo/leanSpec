[pytest]
# Configuration for lean-fill command

# Load pytest plugins
addopts =
    -p lean_spec_test_tools.pytest_plugins.filler
    -p lean_spec_test_tools.pytest_plugins.fixtures
    # Show shorter tracebacks
    --tb=short

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')

# Minimal output for filling
console_output_style = classic
